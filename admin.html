<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body { font-family: Arial; text-align: center; padding-top: 50px; }
input, textarea { padding: 10px; margin: 10px; width: 250px; }
button { padding: 10px 20px; margin: 5px; cursor: pointer; }
</style>
</head>
<body>

<h1>Admin Panel </h1>

<h3>Send To One User</h3>
<input type="text" id="targetUser" placeholder="Username"><br>
<input type="text" id="messageText" placeholder="Message"><br>
<input type="text" id="messageLink" placeholder="Link"><br>
<button onclick="sendOne()">Send</button>

<h3>Send To All Users</h3>
<input type="text" id="allText" placeholder="Message"><br>
<input type="text" id="allLink" placeholder="Link"><br>
<button onclick="sendAll()">Send To All</button>
<button onclick="deleteAllMessages()" style="background-color: #ff4444; color: white;">
  Delete All Messages 
</button>

<br><br>
<button onclick="logout()">Logout</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
  getFirestore, doc, setDoc, collection, getDocs, getDoc, serverTimestamp, deleteDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEyexTkLjLq6t-ndDJaMT1je3iTsRMyks",
  authDomain: "login-f4cfb.firebaseapp.com",
  projectId: "login-f4cfb",
  storageBucket: "login-f4cfb.firebasestorage.app",
  messagingSenderId: "549120000150",
  appId: "1:549120000150:web:2cb8fa292be0eed87202b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  try {
    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    if (!userSnap.exists() || userSnap.data().role !== "admin") {
      alert("Access Denied.");
      window.location.href = "dashboard.html";
    }
  } catch (error) {
    console.error("Admin Access Error:", error);
  }
});

window.sendOne = async function () {
  const user = document.getElementById("targetUser").value;
  await setDoc(doc(db, "messages", user), {
    text: document.getElementById("messageText").value,
    link: document.getElementById("messageLink").value,
    timestamp: serverTimestamp()
  });
  alert("Message sent!");
};

window.sendAll = async function () {
  const usersSnapshot = await getDocs(collection(db, "users"));
  usersSnapshot.forEach(async (docSnap) => {
    await setDoc(doc(db, "messages", docSnap.id), {
      text: document.getElementById("allText").value,
      link: document.getElementById("allLink").value,
      timestamp: serverTimestamp()
    });
  });
  alert("Sent to all users!");
};
window.deleteAllMessages = async function () {
  if (!confirm("Are you sure you want to delete messages for EVERYONE?")) return;

  try {
    const messagesSnapshot = await getDocs(collection(db, "messages"));
    
    // Create an array of delete promises to run them all at once
    const deletePromises = messagesSnapshot.docs.map((docSnap) => 
      deleteDoc(doc(db, "messages", docSnap.id))
    );

    await Promise.all(deletePromises);
    alert("All messages have been cleared!");
  } catch (error) {
    console.error("Error deleting messages:", error);
    alert("Failed to delete messages. Check console.");
  }
};
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};
</script>
</body>
</html>
