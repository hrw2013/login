```html
<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body { font-family: Arial; text-align: center; padding-top: 50px; }
input { padding: 10px; margin: 10px; width: 250px; }
button { padding: 10px 20px; margin: 5px; }
textarea { width: 250px; height: 80px; }
</style>

</head>
<body>

<h1>Admin Panel 👑</h1>

<h3>Send To One User</h3>
<input type="text" id="targetUser" placeholder="Username"><br>
<input type="text" id="messageText" placeholder="Message"><br>
<input type="text" id="messageLink" placeholder="Link"><br>
<button onclick="sendOne()">Send</button>

<h3>Send To All Users</h3>
<input type="text" id="allText" placeholder="Message"><br>
<input type="text" id="allLink" placeholder="Link"><br>
<button onclick="sendAll()">Send To All</button>

<br><br>
<button onclick="logout()">Logout</button>

<hr>

<h2>Inbox</h2>

<div id="adminInbox"></div>

<div id="adminReplyBox" style="display:none; margin-top:20px;">
<h3>Reply</h3>
<div id="replyingTo"></div>
<textarea id="adminReplyMessage" placeholder="Type reply"></textarea>
<br><br>
<button id="sendAdminReply">Send Reply</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
collection,
getDocs,
getDoc,
onSnapshot,
query,
where,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBEyexTkLjLq6t-ndDJaMT1je3iTsRMyks",
authDomain: "login-f4cfb.firebaseapp.com",
projectId: "login-f4cfb",
storageBucket: "login-f4cfb.firebasestorage.app",
messagingSenderId: "549120000150",
appId: "1:549120000150:web:2cb8fa292be0eed87202b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const targetUser = document.getElementById("targetUser");
const messageText = document.getElementById("messageText");
const messageLink = document.getElementById("messageLink");

const allText = document.getElementById("allText");
const allLink = document.getElementById("allLink");

const inboxDiv = document.getElementById("adminInbox");
const replyBox = document.getElementById("adminReplyBox");
const replyingToText = document.getElementById("replyingTo");

let currentReplyConversation = null;
let currentReplyUser = null;

/* ---------- AUTH CHECK ---------- */

onAuthStateChanged(auth, async (user) => {

if (!user) {
window.location.href = "index.html";
return;
}

const username = user.email.split("@")[0];

const userDoc = await getDoc(doc(db, "users", username));

if (!userDoc.exists() || userDoc.data().role !== "admin") {
window.location.href = "dashboard.html";
}

});

/* ---------- SEND TO ONE USER ---------- */

window.sendOne = async function () {

const user = targetUser.value;

await setDoc(doc(db, "messages", user), {
text: messageText.value,
link: messageLink.value
});

alert("Message sent!");

};

/* ---------- SEND TO ALL USERS ---------- */

window.sendAll = async function () {

const usersSnapshot = await getDocs(collection(db, "users"));

usersSnapshot.forEach(async (docSnap) => {

await setDoc(doc(db, "messages", docSnap.id), {
text: allText.value,
link: allLink.value
});

});

alert("Sent to all users!");

};

/* ---------- LOGOUT ---------- */

window.logout = function () {
signOut(auth).then(() => window.location.href = "index.html");
};

/* ---------- REALTIME ADMIN INBOX ---------- */

onAuthStateChanged(auth, (user) => {

if (!user) return;

const q = query(
collection(db, "conversations"),
where("participants", "array-contains", user.uid)
);

onSnapshot(q, (snapshot) => {

inboxDiv.innerHTML = "";

snapshot.forEach((docSnap) => {

const convo = docSnap.data();

const otherUser = convo.participants.find(p => p !== user.uid);

const convoDiv = document.createElement("div");

convoDiv.style.border = "1px solid black";
convoDiv.style.padding = "10px";
convoDiv.style.marginBottom = "10px";

convoDiv.innerHTML = `
<strong>User:</strong> ${otherUser}
<br>
<button onclick="openReply('${docSnap.id}', '${otherUser}')">Reply</button>
`;

inboxDiv.appendChild(convoDiv);

});

});

});

/* ---------- OPEN REPLY ---------- */

window.openReply = function(convoId, userId) {

currentReplyConversation = convoId;
currentReplyUser = userId;

replyBox.style.display = "block";

replyingToText.innerText = "Replying to: " + userId;

};

/* ---------- SEND ADMIN REPLY ---------- */

document.getElementById("sendAdminReply").onclick = async () => {

const text = document.getElementById("adminReplyMessage").value;

if (!text) return;

await addDoc(
collection(db, "conversations", currentReplyConversation, "messages"),
{
sender: auth.currentUser.uid,
text: text,
timestamp: serverTimestamp()
}
);

document.getElementById("adminReplyMessage").value = "";

};

</script>

</body>
</html>
