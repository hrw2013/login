<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body { font-family: Arial; text-align: center; padding-top: 100px; }
input { padding: 10px; margin: 10px; width: 200px; }
button { padding: 10px 20px; }
</style>
</head>
<body>

<h2>Login</h2>

<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>

<p id="message"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEyexTkLjLq6t-ndDJaMT1je3iTsRMyks",
  authDomain: "login-f4cfb.firebaseapp.com",
  projectId: "login-f4cfb",
  storageBucket: "login-f4cfb.firebasestorage.app",
  messagingSenderId: "549120000150",
  appId: "1:549120000150:web:2cb8fa292be0eed87202b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");
const message = document.getElementById("message");

window.signup = async function () {
  const username = usernameInput.value;
  const password = passwordInput.value;
  const email = username + "@yourapp.com";

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // Use user.uid as the document ID for consistency
    await setDoc(doc(db, "users", user.uid), {
      username: username,
      email: email,
      role: "student"
    });

    alert("Account created!");
    window.location.href = "dashboard.html";
  } catch (error) {
    message.textContent = error.message;
  }
};

window.login = async function () {
  const username = usernameInput.value;
  const password = passwordInput.value;
  const email = username + "@yourapp.com";

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "dashboard.html";
  } catch (error) {
    message.textContent = "Login failed: " + error.message;
  }
};
</script>
</body>
</html>
