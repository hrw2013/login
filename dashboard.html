<!DOCTYPE html>
<html>
<head>
 <title>Dashboard</title>
 <style>
   #messageDisplay { 
     margin: 20px; padding: 20px; border: 2px solid #333; 
     background: #f9f9f9; display: none; /* Hidden until a message exists */
   }
 </style>
</head>
<body>

<h1>User Dashboard</h1>
<button onclick="logout()">Logout</button>

<div id="messageDisplay">
  <h3 id="msgText"></h3>
  <a id="msgLink" href="#" target="_blank">Click here</a>
 <hr>
<textarea id="replyText" placeholder="Type your reply..."></textarea><br>
<button onclick="sendReply()">Send Reply</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, onSnapshot, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEyexTkLjLq6t-ndDJaMT1je3iTsRMyks",
  authDomain: "login-f4cfb.firebaseapp.com",
  projectId: "login-f4cfb",
  storageBucket: "login-f4cfb.firebasestorage.app",
  messagingSenderId: "549120000150",
  appId: "1:549120000150:web:2cb8fa292be0eed87202b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// --- GLOBAL FUNCTIONS (Move these out of the listener) ---
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  }).catch((error) => {
    console.error("Logout error:", error);
  });
};

window.sendReply = async function() {
    const text = document.getElementById("replyText").value;
    if (!text) return alert("Please type something!");

    try {
        await setDoc(doc(db, "replies", auth.currentUser.uid), {
            uid: auth.currentUser.uid,
            message: text,
            timestamp: serverTimestamp()
        });
        alert("Reply sent to admin!");
        document.getElementById("replyText").value = ""; 
    } catch (error) {
        console.error("Reply error:", error);
    }
};

// --- AUTH LISTENER ---
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const userRef = doc(db, "users", user.uid);
  const userSnap = await getDoc(userRef);

  if (userSnap.exists() && userSnap.data().role === "admin") {
    window.location.href = "admin.html";
    return;
  }

  onSnapshot(doc(db, "messages", user.uid), (docSnap) => {
    const displayBox = document.getElementById("messageDisplay");
    if (docSnap.exists()) {
      const data = docSnap.data();
      displayBox.style.display = "block";
      document.getElementById("msgText").innerText = data.text;
      document.getElementById("msgLink").href = data.link;
      document.getElementById("msgLink").innerText = "View Link";
    } else {
      displayBox.style.display = "none";
    }
  });
});
</script>
</body>

</html>
